services:
  bot:
    build: .
    container_name: gnuchan-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot_data:/data
    # For PostgreSQL, point DATABASE_URL at the db service and depend_on it.

  # Optional PostgreSQL — uncomment and set DATABASE_URL in .env
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: gnubot
  #     POSTGRES_PASSWORD: gnubot
  #     POSTGRES_DB: gnubot
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  bot_data: {}
  # pg_data: {}
